events { worker_connections 1024; }

http {
    # Railway's internal DNS resolver is at [fd12::10]
    # We force ipv6 off to prevent the "Connection Refused" error
    resolver [fd12::10] ipv6=off;

    server {
        listen 80;

        auth_basic "LocalStack Protected Area";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            # We use a variable here to force the use of the 'resolver' above
            set $localstack_url http://localstack-service.railway.internal:4566;
            proxy_pass $localstack_url;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 0; 
        }
    }
}
